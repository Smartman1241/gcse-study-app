<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviseFlow — Sign In</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0b1020;
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.6);
  --border: rgba(255,255,255,.15);
  --accent-gradient: linear-gradient(135deg, #8ea2ff, #46e6b3);
  --transition-speed: 0.25s;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:
    radial-gradient(1200px 700px at 10% 10%, rgba(142,162,255,.25), transparent 60%),
    radial-gradient(900px 600px at 90% 20%, rgba(70,230,179,.15), transparent 55%),
    var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
}

.auth-container {
  width: 100%;
  max-width: 420px;
  padding: 40px;
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(22px);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 25px 80px rgba(0,0,0,.5);
  position: relative;
  overflow: hidden;
}

h1 { 
  margin: 0;
  text-align: center;
  font-size: 32px;
  opacity: 0;
  transform: translateY(-20px);
  animation: fadeIn 0.5s forwards 0.1s;
}

.subtitle { 
  margin: 8px 0 28px;
  text-align: center;
  color: var(--muted);
  font-weight: 500;
  opacity: 0;
  transform: translateY(-10px);
  animation: fadeIn 0.5s forwards 0.3s;
}

input, button, .oauth-btn, .link {
  transition: all var(--transition-speed) ease;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.05);
  color: white;
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 18px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 15px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
}

button:hover {
  filter: brightness(1.05);
}

.oauth-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
}

.google-btn { background: white; color: #1f1f1f; }
.microsoft-btn { background: #2F2F2F; color: white; }

.google-icon,
.ms-icon {
  width: 18px;
  height: 18px;
  background-size: contain;
  background-repeat: no-repeat;
}

.google-icon { background-image: url("https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"); }
.ms-icon { background-image: url("https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"); }

.link {
  margin-top: 14px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
}

.hidden { display: none; }

.message {
  margin-top: 14px;
  text-align: center;
  color: #ff7b8f;
  font-size: 13px;
}

.success { color: #46e6b3; }

.divider {
  margin: 16px 0;
  text-align: center;
  opacity: 0.6;
  font-size: 14px;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<div class="auth-container">

<h1>ReviseFlow</h1>
<div class="subtitle">Smarter revision. Real progress.</div>

<!-- SIGN IN -->
<div id="signin">

  <button class="oauth-btn google-btn" onclick="signInWithGoogle()">
    <span class="google-icon"></span> Continue with Google
  </button>

  <button class="oauth-btn microsoft-btn" onclick="signInWithMicrosoft()">
    <span class="ms-icon"></span> Continue with Microsoft
  </button>

  <div class="divider">─── or ───</div>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signIn()" style="background: var(--accent-gradient); color: white;">Sign In</button>

  <div class="link" onclick="showSignup()">Create account</div>
  <div class="link" onclick="showReset()">Forgot password?</div>

  <div id="signinMsg" class="message"></div>

</div>

<!-- SIGN UP -->
<div id="signup" class="hidden">

  <input id="signupUsername" placeholder="Choose username">
  <input id="signupEmail" type="email" placeholder="Email">
  <input id="signupPassword" type="password" placeholder="Password">
  <button onclick="signUp()" style="background: var(--accent-gradient); color: white;">Create Account</button>
  <div class="link" onclick="showSignin()">Back to sign in</div>
  <div id="signupMsg" class="message"></div>

</div>

<!-- RESET -->
<div id="reset" class="hidden">

  <input id="resetEmail" type="email" placeholder="Email">
  <button onclick="resetPassword()" style="background: var(--accent-gradient); color: white;">Send Reset Link</button>
  <div class="link" onclick="showSignin()">Back to sign in</div>
  <div id="resetMsg" class="message"></div>

</div>

</div>

<script>
const SUPABASE_URL="https://mgpwknnbhaljsscsvucm.supabase.co"
const SUPABASE_KEY="sb_publishable_6tdnozSH6Ck75uDgXPN-sg_Mn7vyLFs"
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

// FIXED REDIRECT URL for Microsoft (must match Azure exactly)
const redirectURL = "https://www.reviseflow.co.uk/index.html"

document.addEventListener("DOMContentLoaded", async () => {
  const { data:{ session } } = await supabaseClient.auth.getSession()
  if(session) window.location.href = redirectURL

  const mode=new URLSearchParams(window.location.search).get("mode")
  if(mode==="signup") showSignup()
  else showSignin()
})

function showSignup(){ signin.classList.add("hidden"); signup.classList.remove("hidden"); reset.classList.add("hidden"); }
function showSignin(){ signup.classList.add("hidden"); reset.classList.add("hidden"); signin.classList.remove("hidden"); }
function showReset(){ signin.classList.add("hidden"); signup.classList.add("hidden"); reset.classList.remove("hidden"); }

async function signIn(){
  signinMsg.textContent=""
  const {error} = await supabaseClient.auth.signInWithPassword({
    email: email.value.trim(),
    password: password.value
  })
  if(error){ signinMsg.textContent=error.message; return }
  window.location.href=redirectURL
}

async function signUp(){
  signupMsg.textContent=""
  const username=signupUsername.value.trim()
  const emailVal=signupEmail.value.trim()
  const passwordVal=signupPassword.value
  if(!username){ signupMsg.textContent="Please choose a username"; return }
  const {error}=await supabaseClient.auth.signUp({
    email: emailVal,
    password: passwordVal,
    options:{data:{username}}
  })
  if(error){ signupMsg.textContent=error.message; return }
  signupMsg.classList.add("success")
  signupMsg.textContent="Account created. Check your email to verify."
}

async function resetPassword(){
  resetMsg.textContent=""
  const {error}=await supabaseClient.auth.resetPasswordForEmail(
    resetEmail.value.trim(),
    {redirectTo: redirectURL}
  )
  if(error){ resetMsg.textContent=error.message; return }
  resetMsg.classList.add("success")
  resetMsg.textContent="Reset email sent"
}

async function signInWithGoogle(){
  const {error}=await supabaseClient.auth.signInWithOAuth({
    provider:"google",
    options:{redirectTo:redirectURL}
  })
  if(error) alert("Google sign in failed: "+error.message)
}

async function signInWithMicrosoft(){
  const {error}=await supabaseClient.auth.signInWithOAuth({
    provider:"azure",
    options:{redirectTo:redirectURL}
  })
  if(error) alert("Microsoft sign in failed: "+error.message)
}
</script>
</body>
</html>
