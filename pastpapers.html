<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GCSE Focus – AQA Past Papers</title>

<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b1020;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.15);
  --text:rgba(255,255,255,.92);
  --brand:#8ea2ff;
}
html[data-theme="light"]{
  --bg:#f5f7ff;
  --glass:rgba(0,0,0,.05);
  --border:rgba(0,0,0,.15);
  --text:rgba(0,0,0,.88);
}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui;
  background:
    radial-gradient(1000px 600px at 15% 10%, rgba(142,162,255,.25), transparent 60%),
    radial-gradient(900px 500px at 85% 20%, rgba(70,230,179,.18), transparent 55%),
    radial-gradient(900px 500px at 70% 90%, rgba(255,211,110,.14), transparent 55%),
    var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
}
.container{
  width:100%;
  max-width:700px;
  padding:30px;
}
.card{
  backdrop-filter:blur(20px);
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:22px;
  padding:40px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
h1{
  text-align:center;
  margin-bottom:30px;
  font-size:28px;
}
label{
  display:block;
  margin-top:18px;
  font-weight:600;
}
select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--glass);
  color:var(--text);
  font-size:15px;
}
select option{
  background:var(--bg);
  color:var(--text);
}
button{
  width:100%;
  padding:14px;
  margin-top:25px;
  border-radius:14px;
  border:none;
  background:var(--brand);
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}
.back{
  background:var(--glass);
  margin-top:15px;
}
.results{
  margin-top:30px;
  padding:20px;
  border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
}
a{
  display:block;
  margin-top:12px;
  color:var(--brand);
  font-weight:600;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>AQA Past Papers</h1>

    <label>Subject</label>
    <select id="subject" onchange="updatePaperOptions(); updateTierOptions();"></select>

    <label>Paper</label>
    <select id="paper"></select>

    <label>Tier</label>
    <select id="tier"></select>

    <label>Year</label>
    <select id="year"></select>

    <button onclick="findPaper()">Find Paper</button>

    <div class="results" id="results" style="display:none;"></div>

    <button class="back" onclick="window.location.href='index.html'">← Back to Dashboard</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://mgpwknnbhaljsscsvucm.supabase.co";
const SUPABASE_KEY = "sb_publishable_6tdnozSH6Ck75uDgXPN-sg_Mn7vyLFs";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Populate subject dropdown dynamically
const subjects = ["English Language","English Literature","Biology","Chemistry","Physics","Maths"];
const subjectSelect = document.getElementById("subject");
subjects.forEach(sub => {
  const option = document.createElement('option');
  option.value = sub;
  option.textContent = sub;
  subjectSelect.appendChild(option);
});

// Populate year dropdown dynamically
const yearSelect = document.getElementById("year");
for(let y=2024; y>=2018; y--){
  const option = document.createElement('option');
  option.value = y;
  option.textContent = y;
  yearSelect.appendChild(option);
}

function updatePaperOptions(){
  const subject = subjectSelect.value;
  const paperSelect = document.getElementById("paper");
  paperSelect.innerHTML = "";
  const options = (subject === "Maths")
    ? ["Paper 1 Non Calculator","Paper 2 Calculator","Paper 3 Calculator"]
    : ["Paper 1","Paper 2"];
  options.forEach(opt => {
    const optionEl = document.createElement('option');
    optionEl.value = opt;
    optionEl.textContent = opt;
    paperSelect.appendChild(optionEl);
  });
}

function updateTierOptions(){
  const subject = subjectSelect.value;
  const tierSelect = document.getElementById("tier");
  tierSelect.innerHTML = "";
  const options = (subject === "English Language" || subject === "English Literature")
    ? ["N/A"]
    : ["Foundation","Higher"];
  options.forEach(opt => {
    const optionEl = document.createElement('option');
    optionEl.value = opt;
    optionEl.textContent = opt;
    tierSelect.appendChild(optionEl);
  });
}

async function findPaper(){
  const subject = subjectSelect.value;
  const paper_type = document.getElementById("paper").value;
  const tier = document.getElementById("tier").value;
  const year = parseInt(yearSelect.value);

  const results = document.getElementById("results");
  results.style.display = "block";
  results.innerHTML = "";
  const loading = document.createElement('p');
  loading.textContent = "Searching...";
  results.appendChild(loading);

  const { data, error } = await supabaseClient
    .from("past_papers")
    .select("*")
    .eq("subject", subject)
    .eq("paper_type", paper_type)
    .eq("tier", tier)
    .eq("year", year);

  results.innerHTML = "";
  if(error || !data || data.length===0){
    const msg = document.createElement('p');
    msg.textContent = "No papers found in the database.";
    results.appendChild(msg);
    return;
  }

  data.forEach(paper => {
    const container = document.createElement('div');
    container.style.marginBottom = "20px";

    const title = document.createElement('h3');
    title.textContent = `${paper.year} ${paper.subject} - ${paper.paper_type} (${paper.tier})`;
    container.appendChild(title);

    if(paper.question_link){
      const qLink = document.createElement('a');
      qLink.textContent = "📄 View Official Paper";
      qLink.href = paper.question_link;
      qLink.target = "_blank";
      qLink.rel = "noopener noreferrer";
      container.appendChild(qLink);
    }

    if(paper.markscheme_link){
      const mLink = document.createElement('a');
      mLink.textContent = "📝 View Mark Scheme";
      mLink.href = paper.markscheme_link;
      mLink.target = "_blank";
      mLink.rel = "noopener noreferrer";
      container.appendChild(mLink);
    }

    results.appendChild(container);
  });
}

// Initial population
updatePaperOptions();
updateTierOptions();
</script>

</body>
</html>
